<h1>使い方</h1>

<h2>1 タスクを追加</h2>
<p>行動リストに実行したいタスクを追加します。</p>

<h2>2 実行時間を設定</h2>
<p>タスクを行う時間を選択します。</p>

<h2>3 タスクを決定</h2>
<p>「タスクを決める」を押すとランダムに選ばれます。</p>

<h2>4 タイマー開始</h2>
<p>STARTボタンでタイマーが開始されます。</p>
